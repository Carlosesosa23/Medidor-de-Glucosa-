<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=390, initial-scale=1.0" name="viewport"/>
<title>Vitality Journey - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-surface-variant": "#40493d",
                    "surface-bright": "#f8f9fa",
                    "on-primary-container": "#cbffc2",
                    "secondary-fixed-dim": "#90d792",
                    "tertiary": "#774d00",
                    "on-tertiary-fixed": "#291800",
                    "on-secondary-fixed": "#002107",
                    "surface-variant": "#e1e3e4",
                    "surface-container-low": "#f3f4f5",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            width: 390px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: #ffffff;
            color: #191c1d;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="flex flex-col min-h-screen">
<!-- Top AppBar (Supressed Navigation for Transactional Onboarding) -->
<header class="w-full top-0 flex items-center justify-between px-6 py-4 bg-[#f8f9fa] dark:bg-[#191c1d] transition-opacity duration-300">
<div class="text-lg font-['Manrope'] font-bold tracking-tight text-green-900 dark:text-green-50">
            Vitality Journey
        </div>
<div class="text-slate-500 dark:text-slate-400 hover:bg-green-50 dark:hover:bg-green-900/20 rounded-full p-2 transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-8 pb-12 pt-4">
<!-- Progress Bar -->
<div class="flex gap-2 mb-16">
<div class="h-1.5 flex-1 bg-primary-container rounded-full"></div>
<div class="h-1.5 flex-1 bg-surface-container rounded-full"></div>
<div class="h-1.5 flex-1 bg-surface-container rounded-full"></div>
</div>
<!-- Center Content -->
<div class="flex-1 flex flex-col items-center justify-center text-center space-y-8">
<!-- Icon Badge -->
<div class="relative">
<div class="w-32 h-32 rounded-full bg-gradient-to-br from-primary-container to-primary flex items-center justify-center shadow-[0_20px_40px_-15px_rgba(13,99,27,0.3)]">
<span class="material-symbols-outlined text-white text-6xl" data-icon="water_drop" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<!-- Editorial Accent -->
<div class="absolute -top-2 -right-2 w-8 h-8 bg-tertiary rounded-full border-4 border-white"></div>
</div>
<!-- Title & Subtitle Group -->
<div class="space-y-4">
<h1 class="font-headline font-extrabold text-[2.5rem] leading-[1.1] tracking-tight">
<span class="text-on-surface">Bienvenida a</span><br/>
<span class="text-primary-container">GlucosaTracker</span>
</h1>
<p class="text-outline font-body text-lg leading-relaxed max-w-[280px] mx-auto">
                    Tu compañera para controlar tu glucosa de manera fácil y ordenada.
                </p>
</div>
<!-- Decorative Element (Editorial Offsetting) -->
<div class="w-full pt-4 opacity-10">
<div class="h-[2px] w-12 bg-primary mx-auto rounded-full"></div>
</div>
</div>
<!-- Footer Action -->
<div class="mt-auto pt-8">
<button class="w-full bg-primary-container text-white font-headline font-bold py-5 px-8 rounded-full shadow-lg shadow-primary-container/20 flex items-center justify-center gap-2 hover:scale-[1.02] active:scale-95 transition-all text-lg">
                Comenzar
                <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Secondary Context Link -->
<p class="mt-6 text-center text-label-sm font-label uppercase tracking-widest text-outline-variant text-[0.7rem]">
                Paso 1 de 3
            </p>
</div>
</main>
<!-- Bottom Navigation Suppressed for Focused Journey -->
</body></html>
